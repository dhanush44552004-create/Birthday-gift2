<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love ❤️</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  overflow:hidden;
  padding:20px;
}

.container{
  background:white;
  padding:30px 20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  max-width:400px;
  width:100%;
  animation:fadeIn 2s ease-in-out;
}

h1{
  font-size:28px;
  color:#ff4e8a;
}

h2{
  font-size:22px;
  margin:10px 0;
}

p{
  font-size:16px;
  margin:15px 0;
  color:#555;
}

button{
  padding:12px 25px;
  border:none;
  background:#ff4e8a;
  color:white;
  border-radius:25px;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#ff1f6b;
  transform:scale(1.05);
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

/* Mobile Responsive */
@media(max-width:480px){
  h1{font-size:22px;}
  h2{font-size:18px;}
  p{font-size:14px;}
}

canvas{
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container">
  <h1>🎉 Happy Birthday 🎉</h1>
  <h2>My Beautiful Princess ❤️</h2>
  <p>
   My Dear Niveeee... On this special day, I just want to say…  
    You are my happiness, my smile, and my everything.  
    May your life be filled with love, success, and endless joy. 💖
     Hold My Hand bangaruuu I Am Not Gonna a leave u  
  </p>
  <button onclick="startConfetti()">Celebrate 🎊</button>
</div>

<script>
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];

function randomColor(){
  const colors = ["#ff4e8a","#ffd700","#00c9ff","#7cffcb","#ff8c00"];
  return colors[Math.floor(Math.random()*colors.length)];
}

function createConfetti(){
  for(let i=0;i<150;i++){
    pieces.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      size:Math.random()*8+4,
      speedY:Math.random()*3+2,
      color:randomColor()
    });
  }
}

function drawConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pieces.forEach((p)=>{
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,p.size,p.size);
    p.y+=p.speedY;

    if(p.y>canvas.height){
      p.y=0;
      p.x=Math.random()*canvas.width;
    }
  });
  requestAnimationFrame(drawConfetti);
}

function startConfetti(){
  pieces=[];
  createConfetti();
  drawConfetti();
}
</script>

</body>
</html>
